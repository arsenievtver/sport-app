<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sport-app</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="landing-main">
      <h1>sport-app</h1>
      <p>
        Платформа для тренеров и спортсменов: программы, прогресс, мотивация на
        основе научных подходов.
      </p>
      <nav class="site-nav">
        <a id="athlete-link" class="btn" href="https://my.athlete-app.ru">Приложение атлета</a>
        <a id="coach-link" class="btn secondary" href="https://coach.athlete-app.ru"
          >Кабинет тренера</a
        >
        <a id="coach-web-link" class="btn secondary" href="https://coach-web.athlete-app.ru"
          >Coach Web</a
        >
      </nav>
    </main>

    <footer class="site-footer">
      <a href="/privacy/">Политика конфиденциальности</a>
    </footer>

    <script>
      const host = location.hostname.replace(/^www\./, "");
      const base = host.includes(".") ? host.slice(host.indexOf(".") + 1) : host;
      document.getElementById("athlete-link").href = `https://my.${base}`;
      document.getElementById("coach-link").href = `https://coach.${base}`;
      document.getElementById("coach-web-link").href = `https://coach-web.${base}`;
    </script>
  </body>
</html>
